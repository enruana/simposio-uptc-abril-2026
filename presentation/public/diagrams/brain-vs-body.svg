<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" fill="none">
  <defs>
    <filter id="rough2">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="3" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2"/>
    </filter>
    <style>
      .stroke { stroke: #d4d4d4; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .stroke-dim { stroke: #6b6b6b; stroke-width: 1.5; fill: none; stroke-linecap: round; }
      .accent { stroke: #00ff88; }
      .danger { stroke: #ff3b5f; }
      .text { font-family: 'Caveat', cursive; font-size: 22px; fill: #d4d4d4; font-weight: 600; }
      .text-small { font-family: 'Caveat', cursive; font-size: 16px; fill: #6b6b6b; }
      .text-accent { font-family: 'Caveat', cursive; font-size: 18px; fill: #00ff88; }
      .text-danger { font-family: 'Caveat', cursive; font-size: 18px; fill: #ff3b5f; }
      .label-big { font-family: 'Caveat', cursive; font-size: 28px; fill: #f5f5f5; font-weight: 700; }
    </style>
    <marker id="arrowEnd" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6b6b6b"/>
    </marker>
    <marker id="arrowAccent" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#00ff88"/>
    </marker>
  </defs>

  <g filter="url(#rough2)">
    <!-- DIVIDING LINE -->
    <line class="stroke-dim" x1="450" y1="30" x2="450" y2="470" stroke-dasharray="5,5"/>

    <!-- LEFT SIDE: Brain on a chair (API directo) -->
    <text class="label-big" x="100" y="60" text-anchor="start">Modelo directo</text>
    <text class="text-small" x="100" y="80" text-anchor="start">(API, Cursor, Copilot...)</text>

    <!-- Brain shape -->
    <path class="stroke" d="M 170 180
                          Q 150 150 170 130
                          Q 190 110 220 120
                          Q 240 110 260 120
                          Q 290 110 310 130
                          Q 330 150 310 180
                          Q 320 200 310 220
                          Q 280 240 240 235
                          Q 200 240 170 220
                          Q 160 200 170 180 Z"/>

    <!-- Brain wrinkles -->
    <path class="stroke-dim" d="M 200 160 Q 220 170 235 160"/>
    <path class="stroke-dim" d="M 250 170 Q 270 180 280 170"/>
    <path class="stroke-dim" d="M 210 200 Q 240 210 270 200"/>

    <!-- Chair -->
    <path class="stroke-dim" d="M 180 260 L 320 260 L 310 320 L 190 320 Z"/>
    <path class="stroke-dim" d="M 180 260 L 180 340"/>
    <path class="stroke-dim" d="M 320 260 L 320 340"/>
    <path class="stroke-dim" d="M 190 320 L 190 380"/>
    <path class="stroke-dim" d="M 310 320 L 310 380"/>

    <!-- Label -->
    <text class="text-danger" x="250" y="420" text-anchor="middle">solo piensa</text>
    <text class="text-danger" x="250" y="445" text-anchor="middle">no puede hacer</text>

    <!-- Missing features with X -->
    <text class="text-small" x="80" y="260" text-anchor="start">✗ sin ojos</text>
    <text class="text-small" x="80" y="285" text-anchor="start">✗ sin manos</text>
    <text class="text-small" x="80" y="310" text-anchor="start">✗ sin memoria</text>
    <text class="text-small" x="80" y="335" text-anchor="start">✗ sin reglas</text>

    <!-- RIGHT SIDE: Brain WITH body (Claude Code) -->
    <text class="label-big" x="550" y="60" text-anchor="start">Modelo en Claude Code</text>
    <text class="text-small" x="550" y="80" text-anchor="start">(harness filtrado 512K líneas)</text>

    <!-- Same brain -->
    <path class="stroke accent" d="M 620 160
                          Q 600 130 620 110
                          Q 640 90 670 100
                          Q 690 90 710 100
                          Q 740 90 760 110
                          Q 780 130 760 160
                          Q 770 180 760 200
                          Q 730 220 690 215
                          Q 650 220 620 200
                          Q 610 180 620 160 Z"/>

    <!-- Body structure: arms reaching out -->
    <!-- Left arm with eye -->
    <path class="stroke" d="M 615 210 Q 560 230 520 260 Q 505 275 510 295"/>
    <circle class="stroke" cx="510" cy="310" r="20"/>
    <circle cx="510" cy="310" r="5" fill="#00ff88"/>
    <text class="text-accent" x="510" y="355" text-anchor="middle">ojos</text>
    <text class="text-small" x="510" y="375" text-anchor="middle">Read, Grep, Glob</text>

    <!-- Right arm with hand holding tools -->
    <path class="stroke" d="M 765 210 Q 810 230 840 260 Q 855 275 850 295"/>
    <path class="stroke" d="M 840 290 L 830 320 L 860 320 L 870 290 Z"/>
    <text class="text-accent" x="850" y="355" text-anchor="middle">manos</text>
    <text class="text-small" x="850" y="375" text-anchor="middle">Write, Edit, Bash</text>

    <!-- Memory (brain cloud above) -->
    <path class="stroke-dim" d="M 650 30 Q 630 25 625 40 Q 610 45 615 60 Q 605 65 615 75 Q 625 80 645 75 Q 665 80 685 75 Q 705 80 720 70 Q 730 55 720 45 Q 710 30 690 30 Q 670 25 650 30 Z"/>
    <text class="text-accent" x="670" y="55" text-anchor="middle">memoria</text>
    <text class="text-small" x="670" y="73" text-anchor="middle">CLAUDE.md</text>

    <!-- Sandbox (dotted floor) -->
    <path class="stroke-dim accent" d="M 490 400 L 870 400" stroke-dasharray="5,3"/>
    <text class="text-accent" x="680" y="425" text-anchor="middle">sandbox OS-level</text>

    <!-- Permissions (shield on brain) -->
    <path class="stroke" d="M 690 130 L 680 135 L 680 150 Q 680 160 690 165 Q 700 160 700 150 L 700 135 Z"/>
    <text class="text-small" x="730" y="135" text-anchor="start">permisos</text>
    <text class="text-small" x="730" y="150" text-anchor="start">3 tiers</text>

    <!-- VS indicator in middle -->
    <text class="label-big" x="450" y="260" text-anchor="middle" style="fill: #00ff88;">VS</text>

    <!-- Arrow from left to right -->
    <path class="stroke accent" d="M 380 440 Q 450 470 520 440" marker-end="url(#arrowAccent)"/>
    <text class="text-accent" x="450" y="470" text-anchor="middle">mismo cerebro, distinto cuerpo</text>
  </g>
</svg>
