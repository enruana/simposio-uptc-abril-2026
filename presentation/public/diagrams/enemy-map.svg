<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" fill="none">
  <defs>
    <filter id="roughMap">
      <feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="2" seed="5" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2.5"/>
    </filter>
    <style>
      .stroke { stroke: #d4d4d4; stroke-width: 2; fill: none; stroke-linecap: round; }
      .stroke-dim { stroke: #6b6b6b; stroke-width: 1.5; fill: none; stroke-linecap: round; }
      .accent { stroke: #00ff88; }
      .danger { stroke: #ff3b5f; }
      .text { font-family: 'Caveat', cursive; font-size: 20px; fill: #d4d4d4; font-weight: 600; }
      .text-small { font-family: 'Caveat', cursive; font-size: 16px; fill: #6b6b6b; }
      .text-accent { font-family: 'Caveat', cursive; font-size: 18px; fill: #00ff88; }
      .text-danger { font-family: 'Caveat', cursive; font-size: 20px; fill: #ff3b5f; font-weight: 700; }
    </style>
  </defs>

  <g filter="url(#roughMap)">
    <!-- Path / road (wavy line from hero to treasure) -->
    <path class="stroke-dim" d="M 60 200 Q 180 150 250 200 Q 330 260 400 180 Q 480 110 560 200 Q 640 290 730 190 Q 820 100 850 200"
          stroke-dasharray="8,6"/>

    <!-- Hero (start) - small figure -->
    <circle class="stroke accent" cx="60" cy="200" r="15"/>
    <path class="stroke" d="M 60 215 L 60 245"/>
    <path class="stroke" d="M 45 230 L 75 230"/>
    <path class="stroke" d="M 60 245 L 50 270"/>
    <path class="stroke" d="M 60 245 L 70 270"/>
    <text class="text-accent" x="60" y="300" text-anchor="middle">TÚ</text>

    <!-- Enemy 1: Over-Engineering (Demonio) -->
    <g transform="translate(250, 200)">
      <!-- Body - scribbly demon -->
      <path class="stroke danger" d="M -25 -10 Q -35 -25 -25 -40 Q -5 -55 15 -40 Q 25 -25 25 -10 Q 30 10 15 25 Q -5 35 -25 25 Q -30 10 -25 -10 Z"/>
      <!-- Horns -->
      <path class="stroke danger" d="M -15 -35 L -25 -50 L -10 -45"/>
      <path class="stroke danger" d="M 10 -35 L 25 -50 L 15 -45"/>
      <!-- Eyes -->
      <circle class="stroke-dim" cx="-8" cy="-15" r="3" fill="#ff3b5f"/>
      <circle class="stroke-dim" cx="8" cy="-15" r="3" fill="#ff3b5f"/>
      <!-- Teeth -->
      <path class="stroke-dim" d="M -10 5 L -5 15 L 0 5 L 5 15 L 10 5"/>
      <text class="text-danger" x="0" y="60" text-anchor="middle">#1</text>
      <text class="text-small" x="0" y="80" text-anchor="middle">Over-Engineering</text>
    </g>

    <!-- Enemy 2: Slopsquatting (Saqueador) -->
    <g transform="translate(500, 200)">
      <!-- Bandit figure - hooded -->
      <path class="stroke danger" d="M -30 -40 Q -20 -55 0 -55 Q 20 -55 30 -40 L 30 20 L -30 20 Z"/>
      <!-- Hood shadow (dark face) -->
      <path class="stroke-dim" d="M -20 -35 Q -15 -25 -10 -25"/>
      <path class="stroke-dim" d="M 20 -35 Q 15 -25 10 -25"/>
      <!-- Glowing red eyes -->
      <circle cx="-8" cy="-25" r="2" fill="#ff3b5f"/>
      <circle cx="8" cy="-25" r="2" fill="#ff3b5f"/>
      <!-- Package box in hand -->
      <rect class="stroke" x="-10" y="10" width="20" height="20"/>
      <text class="text-small" x="0" y="25" text-anchor="middle" style="font-size: 10px;">pkg</text>

      <text class="text-danger" x="0" y="55" text-anchor="middle">#2</text>
      <text class="text-small" x="0" y="75" text-anchor="middle">Slopsquatting</text>
    </g>

    <!-- Enemy 3: Prompt Injection (Serpiente) -->
    <g transform="translate(730, 190)">
      <!-- Snake body - wavy -->
      <path class="stroke danger" d="M -40 0 Q -20 -15 0 -5 Q 20 5 40 -5 Q 50 0 40 15 Q 20 25 0 15 Q -20 5 -40 15 Z"/>
      <!-- Head -->
      <ellipse class="stroke danger" cx="40" cy="-5" rx="15" ry="10"/>
      <!-- Eye -->
      <circle cx="45" cy="-5" r="2" fill="#ff3b5f"/>
      <!-- Fangs -->
      <path class="stroke danger" d="M 40 5 L 45 12 L 48 5"/>
      <!-- Forked tongue -->
      <path class="stroke danger" d="M 55 -5 L 60 -8 M 55 -5 L 60 -2"/>
      <!-- Scale pattern -->
      <path class="stroke-dim" d="M -30 0 L -20 -5 L -10 0 M -10 0 L 0 -5 L 10 0 M 10 0 L 20 -5 L 30 0"/>

      <text class="text-danger" x="0" y="45" text-anchor="middle">#3</text>
      <text class="text-small" x="0" y="65" text-anchor="middle">Prompt Injection</text>
      <text class="text-small" x="0" y="80" text-anchor="middle" style="font-style: italic;">(invisible)</text>
    </g>

    <!-- Treasure at end (community/builder) -->
    <g transform="translate(850, 200)">
      <circle class="stroke accent" r="25"/>
      <text x="0" y="5" text-anchor="middle" style="font-family: 'Caveat', cursive; font-size: 30px; fill: #00ff88;">{·}</text>
      <text class="text-accent" x="0" y="50" text-anchor="middle">comunidad</text>
      <text class="text-accent" x="0" y="68" text-anchor="middle">open source</text>
    </g>

    <!-- Map title -->
    <text class="text" x="450" y="40" text-anchor="middle">El viaje del builder</text>
    <text class="text-small" x="450" y="60" text-anchor="middle">conocer a los enemigos es lo que te vuelve competente</text>

    <!-- Compass rose in corner -->
    <g transform="translate(820, 350)">
      <circle class="stroke-dim" r="20"/>
      <text x="0" y="-10" text-anchor="middle" style="font-family: 'Caveat', cursive; font-size: 12px; fill: #6b6b6b;">N</text>
      <text x="0" y="18" text-anchor="middle" style="font-family: 'Caveat', cursive; font-size: 12px; fill: #6b6b6b;">S</text>
      <line class="stroke-dim" x1="-5" y1="-5" x2="5" y2="5"/>
      <line class="stroke-dim" x1="5" y1="-5" x2="-5" y2="5"/>
    </g>
  </g>
</svg>
